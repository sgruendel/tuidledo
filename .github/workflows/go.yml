name: Go

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Run tests
        run: go test ./...

      - name: Build
        run: go build ./cmd/tuidledo

  release:
    name: Release Binaries
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset_suffix: linux_x86_64
            binary_name: tuidledo
            archive_ext: tar.gz
          - goos: windows
            goarch: amd64
            asset_suffix: windows_x86_64
            binary_name: tuidledo.exe
            archive_ext: zip
          - goos: darwin
            goarch: amd64
            asset_suffix: macos_x86_64
            binary_name: tuidledo
            archive_ext: tar.gz
          - goos: darwin
            goarch: arm64
            asset_suffix: macos_arm64
            binary_name: tuidledo
            archive_ext: tar.gz

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}
          TOODLEDO_CLIENT_ID: ${{ secrets.TOODLEDO_CLIENT_ID }}
          TOODLEDO_CLIENT_SECRET: ${{ secrets.TOODLEDO_CLIENT_SECRET }}
          ASSET_SUFFIX: ${{ matrix.asset_suffix }}
          BINARY_NAME: ${{ matrix.binary_name }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
        run: |
          test -n "$TOODLEDO_CLIENT_ID"
          test -n "$TOODLEDO_CLIENT_SECRET"

          dist_dir="dist/tuidledo_${VERSION}_${ASSET_SUFFIX}"
          archive_path="dist/tuidledo_${VERSION}_${ASSET_SUFFIX}.${ARCHIVE_EXT}"
          mkdir -p "$dist_dir"

          go build -trimpath \
            -ldflags "-s -w -X main.version=$VERSION -X main.clientID=$TOODLEDO_CLIENT_ID -X main.clientSecret=$TOODLEDO_CLIENT_SECRET" \
            -o "$dist_dir/$BINARY_NAME" \
            ./cmd/tuidledo

          cp README.md LICENSE "$dist_dir/"

          if [ "$ARCHIVE_EXT" = "zip" ]; then
            (
              cd dist
              zip -r "tuidledo_${VERSION}_${ASSET_SUFFIX}.zip" "tuidledo_${VERSION}_${ASSET_SUFFIX}"
            )
          else
            tar -C dist -czf "$archive_path" "tuidledo_${VERSION}_${ASSET_SUFFIX}"
          fi

          sha256sum "$archive_path" > "$archive_path.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tuidledo_${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}_${{ matrix.asset_suffix }}
          path: |
            dist/tuidledo_${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}_${{ matrix.asset_suffix }}.${{ matrix.archive_ext }}
            dist/tuidledo_${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}_${{ matrix.asset_suffix }}.${{ matrix.archive_ext }}.sha256

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/tuidledo_${{ github.ref_name }}_${{ matrix.asset_suffix }}.${{ matrix.archive_ext }}
            dist/tuidledo_${{ github.ref_name }}_${{ matrix.asset_suffix }}.${{ matrix.archive_ext }}.sha256
